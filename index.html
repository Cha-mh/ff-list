<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f7f8;--bg3:#efefef;
  --text:#111;--text2:#666;--text3:#aaa;
  --border:#e5e5e5;--border2:#d0d0d0;
  --accent:#5b7fff;--accent-bg:#eef1ff;
  --red:#ff3b30;--red-bg:#fff0ef;
  --star:#f5a623;
  --green:#34c759;
  --orange:#ff9500;
  --r:14px;--rs:9px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--bg2:#1c1c1e;--bg3:#2c2c2e;
  --text:#f0f0f0;--text2:#8e8e93;--text3:#48484a;
  --border:#2c2c2e;--border2:#3a3a3c;
  --accent-bg:#1c2140;--red-bg:#2a1210;
  --shadow:0 2px 12px rgba(0,0,0,.3);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-top h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.stats{font-size:13px;color:var(--text2)}
.toolbar{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:38px;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn svg{width:15px;height:15px;flex-shrink:0}

/* ── LIST ── */
.list{padding:0 12px 80px}

/* ── ITEM WRAPPER (overflow hidden for swipe) ── */
.item-wrap{position:relative;margin-top:8px;border-radius:var(--r);overflow:hidden;background:var(--bg2)}

/* revealed action buttons behind */
.item-actions{position:absolute;top:0;right:0;bottom:0;display:flex;align-items:stretch}
.action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:72px;border:none;cursor:pointer;font-size:10px;font-weight:600;color:#fff;transition:opacity .15s}
.action-btn:active{opacity:.8}
.action-btn svg{width:20px;height:20px}
.action-star{background:var(--star)}
.action-cross{background:var(--orange)}
.action-del{background:var(--red)}

/* sliding item card */
.item-card{position:relative;z-index:1;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s;will-change:transform;touch-action:pan-y}
.item-card.swiped{transform:translateX(-216px)}
.item-card.read{background:var(--bg2)}
.item-card.read .item-title{color:var(--text3)}
.item-card.strikethrough .item-title{text-decoration:line-through;color:var(--text3)}

/* drag handle */
.handle{display:flex;align-items:center;justify-content:center;padding:0 4px 0 10px;min-height:58px;min-width:32px;cursor:grab;color:var(--text3);flex-shrink:0;touch-action:none}
.handle:active{cursor:grabbing}
.handle svg{width:16px;height:16px}

/* number - editable */
.num-wrap{display:flex;align-items:center;justify-content:center;min-width:36px;flex-shrink:0}
.num{font-size:12px;color:var(--text3);text-align:center;padding:2px 4px;border-radius:5px;min-width:28px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text3);font-family:inherit;width:32px;text-align:center}
.num:focus{outline:none;border-color:var(--accent);color:var(--text);background:var(--accent-bg)}

/* content */
.item-content{flex:1;padding:13px 6px 13px 2px;min-width:0}
.item-title{font-size:14px;line-height:1.45;color:var(--text);word-break:break-word;display:block;text-decoration:none}
.item-title:active{opacity:.7}
.item-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.words-badge{font-size:11px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px}
.item-card.read .words-badge{opacity:.5}
.stars-display{display:flex;gap:1px}
.star-char{font-size:12px;color:var(--star)}

/* right check */
.item-right{display:flex;align-items:center;padding:0 12px 0 4px;flex-shrink:0}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.check-circle.checked{background:var(--green);border-color:var(--green)}
.check-circle svg{width:13px;height:13px;color:#fff;opacity:0;transition:opacity .15s}
.check-circle.checked svg{opacity:1}

/* dragging state */
.item-card.dragging{opacity:.35;transform:none!important}
.item-wrap.drag-over-top .item-card{box-shadow:0 -3px 0 var(--accent)}
.item-wrap.drag-over-bottom .item-card{box-shadow:0 3px 0 var(--accent)}

/* ── SHEETS ── */
.overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.35)}
.overlay.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px 48px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:none}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:14px}

/* add sheet */
.inp{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-size:15px;margin-bottom:10px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp-row{display:flex;gap:8px;margin-top:6px}
.inp-row .btn{flex:1;justify-content:center}
.fetch-status{font-size:12px;color:var(--text2);margin-bottom:8px;min-height:18px}
.fetch-status.ok{color:var(--green)}
.fetch-status.err{color:var(--red)}

/* star sheet */
.star-sheet-stars{display:flex;justify-content:center;gap:8px;margin:8px 0 16px}
.star-pick{font-size:36px;padding:4px 8px;border:none;background:none;cursor:pointer;color:var(--border2);transition:color .1s}
.star-pick.on{color:var(--star)}
.star-clear{display:block;width:100%;text-align:center;font-size:13px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px;cursor:pointer;margin-top:4px}

/* random modal */
.rand-sheet .dice{font-size:40px;text-align:center;margin-bottom:12px}
.rand-sheet h3{font-size:18px;text-align:center;margin-bottom:6px;line-height:1.4}
.rand-words{text-align:center;font-size:13px;color:var(--text2);margin-bottom:12px}
.rand-link{display:block;text-align:center;font-size:13px;color:var(--accent);word-break:break-all;margin-bottom:16px}

/* toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;z-index:99;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%)}

/* loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

let items=[], nextId=148;
let starTargetId=null;
// swipe state
let swipeEl=null, swipeStartX=0, swipeStartY=0, swipeDx=0, swipeLocked=null;
let openSwipeWrap=null;
// drag state
let dragIdx=null, touchClone=null, touchLastY=0, dragOver=null;

// ── STORAGE ──
function save(){try{localStorage.setItem('ff2',JSON.stringify({items,nextId}))}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem('ff2');
    if(d){const p=JSON.parse(d);items=p.items;nextId=p.nextId||148;}
    else{items=JSON.parse(JSON.stringify(DEFAULT));}
  }catch(e){items=JSON.parse(JSON.stringify(DEFAULT));}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── RENDER ──
function render(){
  const unread=items.filter(i=>!i.read&&!i.strikethrough).length;
  document.getElementById('stats').textContent=`${items.length}편 · 미읽음 ${unread}`;
  document.getElementById('list').innerHTML=items.map((item,idx)=>{
    const starsHtml=item.stars>0?`<span class="stars-display">${'★'.repeat(item.stars)}</span>`:'' ;
    const wordsHtml=item.words?`<span class="words-badge">${item.words}w</span>`:'';
    const metaHtml=(starsHtml||wordsHtml)?`<div class="item-meta">${wordsHtml}${starsHtml}</div>`:'';
    return `
    <div class="item-wrap" data-idx="${idx}" data-id="${item.id}">
      <div class="item-actions">
        <button class="action-btn action-star" onclick="openStar(${item.id})" aria-label="별점">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          별점
        </button>
        <button class="action-btn action-cross" onclick="toggleStrikethrough(${item.id})" aria-label="취소선">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12h16M12 6l-3 6 3 6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="9" y1="6" x2="15" y2="18" stroke-dasharray="2"/><path d="M8 8s1-2 4-2 4 2 4 2M8 16s1 2 4 2 4-2 4-2"/></svg>
          취소선
        </button>
        <button class="action-btn action-del" onclick="deleteItem(${item.id})" aria-label="삭제">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
          삭제
        </button>
      </div>
      <div class="item-card${item.read?' read':''}${item.strikethrough?' strikethrough':''}"
        data-id="${item.id}">
        <div class="handle"
          ontouchstart="dragStart(event,${idx})"
          ontouchmove="dragMove(event)"
          ontouchend="dragEnd(event)"
          aria-label="순서 변경">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="9" cy="19" r="1.2"/><circle cx="15" cy="5" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="15" cy="19" r="1.2"/></svg>
        </div>
        <div class="num-wrap">
          <input class="num" type="number" value="${idx+1}" min="1" max="${items.length}"
            onchange="moveToNum(${item.id},this.value)"
            onblur="render()"
            onclick="this.select()"
            aria-label="순서 번호"/>
        </div>
        <div class="item-content">
          ${item.url
            ?`<a class="item-title" href="${esc(item.url)}" target="_blank">${esc(item.title)}</a>`
            :`<span class="item-title">${esc(item.title)}</span>`}
          ${metaHtml}
        </div>
        <div class="item-right">
          <div class="check-circle${item.read?' checked':''}" onclick="toggleRead(${item.id})" aria-label="읽음 표시">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
          </div>
        </div>
      </div>
    </div>`}).join('');

  // rebind swipe on each card
  document.querySelectorAll('.item-card').forEach(card=>{
    card.addEventListener('touchstart',onSwipeTouchStart,{passive:true});
    card.addEventListener('touchmove',onSwipeTouchMove,{passive:false});
    card.addEventListener('touchend',onSwipeTouchEnd,{passive:true});
  });
}

// ── ACTIONS ──
function toggleRead(id){
  const i=items.find(x=>x.id===id);
  if(i){i.read=!i.read;if(i.read)i.strikethrough=false;save();closeSwipe();render();}
}
function toggleStrikethrough(id){
  const i=items.find(x=>x.id===id);
  if(i){i.strikethrough=!i.strikethrough;if(i.strikethrough)i.read=false;save();closeSwipe();render();}
}
function deleteItem(id){
  if(!confirm('삭제할까요?'))return;
  items=items.filter(x=>x.id!==id);save();closeSwipe();render();
}
function moveToNum(id,val){
  const to=parseInt(val)-1;
  if(isNaN(to)||to<0||to>=items.length)return;
  const fromIdx=items.findIndex(x=>x.id===id);
  if(fromIdx<0||fromIdx===to)return;
  const moved=items.splice(fromIdx,1)[0];
  items.splice(to,0,moved);
  save();render();
}

// ── STAR ──
function openStar(id){
  starTargetId=id;
  const item=items.find(x=>x.id===id);
  document.getElementById('star-sheet-title').textContent=item?item.title:'';
  const picks=document.getElementById('star-picks');
  picks.innerHTML=[1,2,3,4,5].map(s=>`<button class="star-pick${item&&item.stars>=s?' on':''}" onclick="setStar(${s})">${'★'}</button>`).join('');
  closeSwipe();
  showSheet('star-sheet');
}
function setStar(n){
  const i=items.find(x=>x.id===starTargetId);
  if(i){i.stars=n===0?0:n;save();render();}
  closeAll();
}

// ── RANDOM ──
function pickRandom(){
  const pool=items.filter(i=>!i.read&&!i.strikethrough);
  if(!pool.length){showToast('미읽음 목록이 없어요 🎉');return;}
  const pick=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('rand-title').textContent=pick.title;
  document.getElementById('rand-words').textContent=pick.words?`${pick.words} words`:'';
  const a=document.getElementById('rand-link');
  if(pick.url){a.href=pick.url;a.textContent=pick.url;a.style.display='';}
  else{a.style.display='none';}
  showSheet('rand-sheet');
}

// ── ADD ──
let fetchTimer=null;
function openAdd(){
  document.getElementById('add-url').value='';
  document.getElementById('add-title').value='';
  document.getElementById('fetch-status').textContent='';
  document.getElementById('fetch-status').className='fetch-status';
  showSheet('add-sheet');
  setTimeout(()=>document.getElementById('add-url').focus(),300);
}
function onUrlInput(){
  clearTimeout(fetchTimer);
  const url=document.getElementById('add-url').value.trim();
  if(!url||!url.includes('archiveofourown.org')){return;}
  fetchTimer=setTimeout(()=>fetchAO3(url),600);
}

async function fetchAO3(url){
  const st=document.getElementById('fetch-status');
  st.className='fetch-status';
  st.innerHTML='<span class="spinner"></span>제목과 단어수 불러오는 중...';
  try{
    // Use a CORS proxy
    const proxy='https://corsproxy.io/?'+encodeURIComponent(url);
    const res=await fetch(proxy,{signal:AbortSignal.timeout(10000)});
    if(!res.ok)throw new Error('fetch failed');
    const html=await res.text();
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');

    // title
    let title='';
    const isSeries=url.includes('/series/');
    if(isSeries){
      // series title
      const h2=doc.querySelector('h2.heading');
      title=h2?h2.textContent.trim():'';
      // words: sum of all dd.words inside series meta
      const wordsEls=doc.querySelectorAll('dl.series.meta.group dd.words, .series dl.stats dd.words');
      let totalW=0;
      wordsEls.forEach(el=>{totalW+=parseInt(el.textContent.replace(/,/g,''))||0;});
      const words=totalW>0?totalW.toLocaleString():'';
      document.getElementById('add-title').value=title||'';
      if(words){st.innerHTML=`<span style="color:var(--green)">✓</span> ${title} · ${words} words`;st.className='fetch-status ok';}
      else if(title){st.innerHTML=`<span style="color:var(--green)">✓</span> ${title}`;st.className='fetch-status ok';}
      else{st.innerHTML='제목을 찾지 못했어요';st.className='fetch-status err';}
      document.getElementById('add-title')._words=words||null;
    } else {
      // works: handle adult content gate
      // Check if there's an adult content form
      const adultForm=doc.querySelector('form#adult-fanworks, form[action*="adult"]');
      let workDoc=doc;
      if(adultForm){
        // submit the proceed form via proxy
        const proceedUrl=url+(url.includes('?')?'&':'?')+'view_adult=true';
        const res2=await fetch('https://corsproxy.io/?'+encodeURIComponent(proceedUrl),{signal:AbortSignal.timeout(10000)});
        if(res2.ok){workDoc=parser.parseFromString(await res2.text(),'text/html');}
      }
      const h2=workDoc.querySelector('h2.title.heading');
      title=h2?h2.textContent.trim():'';
      const wordsEl=workDoc.querySelector('dd.words');
      const words=wordsEl?wordsEl.textContent.trim():'';
      document.getElementById('add-title').value=title||'';
      if(words){st.innerHTML=`<span style="color:var(--green)">✓</span> ${title} · ${words} words`;st.className='fetch-status ok';}
      else if(title){st.innerHTML=`<span style="color:var(--green)">✓</span> ${title}`;st.className='fetch-status ok';}
      else{st.innerHTML='제목을 찾지 못했어요 (직접 입력해주세요)';st.className='fetch-status err';}
      document.getElementById('add-title')._words=words||null;
    }
  }catch(e){
    st.textContent='불러오기 실패 (직접 입력해주세요)';st.className='fetch-status err';
  }
}

function confirmAdd(){
  const url=document.getElementById('add-url').value.trim();
  const title=document.getElementById('add-title').value.trim();
  if(!title){document.getElementById('add-title').focus();return;}
  const wordsRaw=document.getElementById('add-title')._words||null;
  items.push({id:nextId++,title,url,read:false,stars:0,strikethrough:false,words:wordsRaw});
  save();render();closeAll();showToast('추가됐어요!');
}

// ── SWIPE TO REVEAL ──
function onSwipeTouchStart(e){
  if(e.touches.length>1)return;
  swipeEl=e.currentTarget;
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swipeDx=0;
  swipeLocked=null;
}
function onSwipeTouchMove(e){
  if(!swipeEl||e.touches.length>1)return;
  const dx=e.touches[0].clientX-swipeStartX;
  const dy=e.touches[0].clientY-swipeStartY;
  if(swipeLocked===null){
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>6)swipeLocked='h';
    else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>6)swipeLocked='v';
    else return;
  }
  if(swipeLocked==='v')return;
  e.preventDefault();
  swipeDx=dx;
  const already=swipeEl.classList.contains('swiped')?-216:0;
  const raw=already+dx;
  const clamped=Math.max(-216,Math.min(0,raw));
  swipeEl.style.transition='none';
  swipeEl.style.transform=`translateX(${clamped}px)`;
}
function onSwipeTouchEnd(){
  if(!swipeEl||swipeLocked!=='h')return;
  swipeEl.style.transition='';
  const already=swipeEl.classList.contains('swiped');
  if(!already&&swipeDx<-60){
    // open: close other first
    if(openSwipeWrap&&openSwipeWrap!==swipeEl.parentElement){
      openSwipeWrap.querySelector('.item-card').classList.remove('swiped');
      openSwipeWrap.querySelector('.item-card').style.transform='';
    }
    swipeEl.classList.add('swiped');
    swipeEl.style.transform='';
    openSwipeWrap=swipeEl.parentElement;
  } else if(already&&swipeDx>40){
    swipeEl.classList.remove('swiped');
    swipeEl.style.transform='';
    openSwipeWrap=null;
  } else {
    swipeEl.style.transform=already?'translateX(-216px)':'';
  }
  swipeEl=null; swipeDx=0; swipeLocked=null;
}
function closeSwipe(){
  if(openSwipeWrap){
    const c=openSwipeWrap.querySelector('.item-card');
    if(c){c.classList.remove('swiped');c.style.transform='';}
    openSwipeWrap=null;
  }
}

// ── TOUCH DRAG (handle only) ──
function dragStart(e,idx){
  if(e.touches.length>1)return;
  dragIdx=idx;
  touchLastY=e.touches[0].clientY;
  const card=e.currentTarget.closest('.item-card');
  card.classList.add('dragging');
  touchClone=card.cloneNode(true);
  const r=card.getBoundingClientRect();
  touchClone.style.cssText=`position:fixed;left:${r.left}px;width:${r.width}px;top:${r.top}px;z-index:200;pointer-events:none;opacity:.9;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);`;
  document.body.appendChild(touchClone);
  e.stopPropagation();
}
function dragMove(e){
  if(dragIdx===null||!touchClone)return;
  e.preventDefault();
  const y=e.touches[0].clientY;
  const dy=y-touchLastY;
  touchClone.style.top=(parseFloat(touchClone.style.top)+dy)+'px';
  touchLastY=y;
  // highlight target
  document.querySelectorAll('.item-wrap').forEach((wrap,i)=>{
    wrap.classList.remove('drag-over-top','drag-over-bottom');
    if(i===dragIdx)return;
    const r=wrap.getBoundingClientRect();
    if(y>=r.top&&y<=r.bottom){
      wrap.classList.add(y<r.top+r.height/2?'drag-over-top':'drag-over-bottom');
      dragOver=i;
    }
  });
  e.stopPropagation();
}
function dragEnd(e){
  if(dragIdx===null)return;
  const y=e.changedTouches[0].clientY;
  let targetIdx=dragIdx;
  document.querySelectorAll('.item-wrap').forEach((wrap,i)=>{
    wrap.classList.remove('drag-over-top','drag-over-bottom');
    const r=wrap.getBoundingClientRect();
    if(y>=r.top&&y<=r.bottom){
      const mid=r.top+r.height/2;
      targetIdx=y<mid?i:Math.min(i+1,items.length-1);
    }
  });
  // fix insertion index
  const insertAt=targetIdx>dragIdx?targetIdx-1:targetIdx;
  if(insertAt!==dragIdx&&insertAt>=0&&insertAt<items.length){
    const moved=items.splice(dragIdx,1)[0];
    items.splice(insertAt,0,moved);
    save();
  }
  document.querySelectorAll('.item-card.dragging').forEach(c=>c.classList.remove('dragging'));
  if(touchClone){touchClone.remove();touchClone=null;}
  dragIdx=null;dragOver=null;
  render();
  e.stopPropagation();
}

// ── SHEETS ──
function showSheet(id){
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function closeAll(){
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'));
  closeSwipe();
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeAll();
  if(e.key==='Enter'&&document.getElementById('add-sheet').classList.contains('show'))confirmAdd();
});

load();render();
</script>
